version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vibration-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vibration_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vibration-net

  nginx:
    image: nginx:alpine
    container_name: vibration-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    networks:
      - vibration-net

volumes:
  postgres_data:

networks:
  vibration-net:
    driver: bridge
